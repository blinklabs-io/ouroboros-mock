# Consensus capture stack: intersect_origin_one_rollforward
#
# Three services:
#   - configurator     Generates pool 1 genesis from testnet.yaml.
#   - cardano-node     Single forging cardano-node, the capture oracle.
#   - capture-sidecar  Runs cmd/capture-sidecar against cardano-node.
#
# Subnet 172.23.0.0/24 (separate from devnet's 172.20, antithesis's
# 172.21, and erastest's 172.22).
#
# Environment variables (override or set via .env):
#   CONSENSUS_CAPTURE_CARDANO_PORT  cardano-node host port (default: 3030)
#   CONSENSUS_CAPTURE_OUTPUT_DIR    host dir that receives vector.json
#                                   (default: ./output)
#
# The capture-sidecar service is gated behind the "capture" profile so a
# plain `docker compose up` brings only the long-running configurator +
# cardano-node services online; run.sh starts the sidecar separately
# via `docker compose run --rm capture-sidecar` so the configurator's
# one-shot exit does not abort the stack.

services:
  configurator:
    build:
      context: ../..
      dockerfile: Dockerfile.configurator
    container_name: consensus-capture-configurator
    volumes:
      - ./testnet.yaml:/testnet.yaml:ro
      - ./configurator.sh:/configurator.sh:ro
      - p1-configs:/configs/1
      - utxo-keys:/configs/utxo-keys

  cardano-node:
    image: ghcr.io/blinklabs-io/cardano-node:11.0.1
    container_name: consensus-capture-cardano-node
    depends_on:
      configurator:
        condition: service_completed_successfully
    environment:
      CARDANO_BLOCK_PRODUCER: "true"
      RESTORE_SNAPSHOT: "false"
    command:
      - "run"
      - "--config"
      - "/configs/configs/config.json"
      - "--topology"
      - "/topology/topology.json"
      - "--database-path"
      - "/data/db"
      - "--socket-path"
      - "/ipc/node.socket"
      - "--shelley-kes-key"
      - "/configs/keys/kes.skey"
      - "--shelley-vrf-key"
      - "/configs/keys/vrf.skey"
      - "--shelley-operational-certificate"
      - "/configs/keys/opcert.cert"
      - "--port"
      - "3001"
    volumes:
      - p1-configs:/configs
      - ./topology/single.json:/topology/topology.json:ro
      - cardano-node-data:/data/db
      - cardano-node-ipc:/ipc
    ports:
      - "${CONSENSUS_CAPTURE_CARDANO_PORT:-3030}:3001"
    networks:
      consensus_capture:
        ipv4_address: 172.23.0.10
    healthcheck:
      test: ["CMD-SHELL", "test -S /ipc/node.socket || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  capture-sidecar:
    # Profile-gated: `docker compose up` does NOT start this. run.sh
    # invokes it via `docker compose run --rm capture-sidecar` after
    # cardano-node is healthy.
    profiles: ["capture"]
    build:
      context: ../../..
      dockerfile: consensus/Dockerfile.capture_sidecar
    depends_on:
      cardano-node:
        condition: service_healthy
    command:
      - "-address"
      - "cardano-node:3001"
      - "-network-magic"
      - "42"
      - "-conversation"
      - "/scenario/capture-conversation.json"
      - "-out"
      - "/capture-output/vector.json"
      - "-title"
      - "intersect_origin_one_rollforward"
      - "-timeout"
      - "120s"
    volumes:
      - ./capture-conversation.json:/scenario/capture-conversation.json:ro
      # Host bind mount: vector.json lands directly on disk, no
      # docker cp round-trip needed.
      - ${CONSENSUS_CAPTURE_OUTPUT_DIR:-./output}:/capture-output
    networks:
      - consensus_capture

networks:
  consensus_capture:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24

volumes:
  p1-configs:
  utxo-keys:
  cardano-node-data:
  cardano-node-ipc:
