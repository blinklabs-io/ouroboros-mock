name: nilaway
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  nilaway:
    name: nilaway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
      - uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v6.2.0 https://github.com/actions/setup-go/releases/tag/v6.2.0
        with:
          go-version: 1.26.x
      - name: install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest
      - name: run nilaway
        run: nilaway -include-pkgs=github.com/blinklabs-io/ouroboros-mock ./...
